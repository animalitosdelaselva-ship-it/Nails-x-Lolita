<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fichas de Clientas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; }
  .nav { background: #fff; border-bottom: 0.5px solid #ddd; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .nav h1 { font-size: 16px; font-weight: 500; }
  .btn { padding: 7px 14px; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; font-size: 13px; font-family: inherit; color: #444; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
  .btn:hover { background: #f0f0ee; }
  .btn.primary { background: #1a1a18; color: #fff; border-color: #1a1a18; }
  .btn.primary:hover { background: #333; }
  .btn.danger { color: #c0392b; border-color: #e0b0ae; }
  .btn.danger:hover { background: #fdf0ef; }
  .search-bar { padding: 16px 20px 8px; }
  .search-wrap { position: relative; }
  .search-wrap input { width: 100%; padding: 9px 14px 9px 36px; border: 0.5px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; background: #fff; outline: none; }
  .search-wrap input:focus { border-color: #aaa; }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #aaa; pointer-events: none; font-size: 14px; }
  .list { padding: 8px 20px 20px; display: flex; flex-direction: column; gap: 8px; }
  .client-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 14px; transition: border-color .15s; }
  .client-card:hover { border-color: #aaa; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: #e8f0fe; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; color: #2a5cc5; flex-shrink: 0; }
  .client-info { flex: 1; min-width: 0; }
  .client-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .client-meta { font-size: 12px; color: #888; margin-top: 2px; }
  .empty { text-align: center; color: #aaa; font-size: 14px; padding: 40px 20px; line-height: 1.6; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a18; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 100; }
  .toast.show { opacity: 1; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ccc; border-top-color: #555; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .form-panel { display: none; position: fixed; inset: 0; background: #f5f5f3; overflow-y: auto; z-index: 20; }
  .form-panel.open { display: block; }
  .form-nav { background: #fff; border-bottom: 0.5px solid #ddd; padding: 14px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 5; }
  .form-nav h2 { font-size: 15px; font-weight: 500; flex: 1; }
  .form-body { padding: 20px; max-width: 640px; margin: 0 auto; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: 1 / -1; }
  .field-label { font-size: 12px; color: #666; font-weight: 500; }
  input[type=text], input[type=tel], input[type=email], input[type=date], input[type=month], input[type=number], textarea {
    font-family: inherit; font-size: 13px; color: #1a1a18; background: #fff;
    border: 0.5px solid #ccc; border-radius: 8px; padding: 8px 10px; width: 100%; outline: none;
  }
  input:focus, textarea:focus { border-color: #888; }
  textarea { resize: vertical; min-height: 72px; }
  .section-sep { font-size: 11px; font-weight: 500; letter-spacing: .5px; color: #999; text-transform: uppercase; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 0.5px solid #ddd; grid-column: 1 / -1; }
  .checkbox-group { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip { display: flex; align-items: center; gap: 5px; background: #f0f0ee; border: 0.5px solid #ddd; border-radius: 20px; padding: 5px 12px; font-size: 12px; color: #555; cursor: pointer; user-select: none; }
  .chip input { width: 13px; height: 13px; margin: 0; cursor: pointer; accent-color: #2a5cc5; }
  .chip.checked { background: #e8f0fe; border-color: #aac4f5; color: #2a5cc5; }
  .form-actions { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; }
</style>
</head>
<body>

<div id="view-list">
  <div class="nav">
    <h1>Mis clientas</h1>
    <button class="btn primary" onclick="openForm(null)">+ Nueva clienta</button>
  </div>
  <div class="search-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Buscar por nombre o teléfono..." oninput="renderList()">
    </div>
  </div>
  <div class="list" id="client-list"><div class="empty"><div class="spinner"></div></div></div>
</div>

<div class="form-panel" id="form-panel">
  <div class="form-nav">
    <button class="btn" onclick="closeForm()">← Volver</button>
    <h2 id="form-title">Nueva clienta</h2>
  </div>
  <div class="form-body">
    <input type="hidden" id="f-id">
    <div class="form-grid">
      <div class="section-sep">Datos personales</div>
      <div class="form-group">
        <label class="field-label">Nombre completo *</label>
        <input type="text" id="f-nombre" placeholder="Nombre y apellido">
      </div>
      <div class="form-group">
        <label class="field-label">Teléfono</label>
        <input type="tel" id="f-telefono" placeholder="+36 ...">
      </div>
      <div class="form-group">
        <label class="field-label">Correo electrónico</label>
        <input type="email" id="f-correo" placeholder="correo@ejemplo.com">
      </div>
      <div class="form-group">
        <label class="field-label">Día de cumpleaños</label>
        <input type="date" id="f-cumple">
      </div>
      <div class="form-group">
        <label class="field-label">Nacionalidad</label>
        <input type="text" id="f-nacionalidad" placeholder="Ej: venezolana, húngara...">
      </div>
      <div class="section-sep">Historial</div>
      <div class="form-group">
        <label class="field-label">Mes de inicio</label>
        <input type="month" id="f-inicio">
      </div>
      <div class="form-group">
        <label class="field-label">Total de citas</label>
        <input type="number" id="f-citas" min="0" placeholder="0">
      </div>
      <div class="form-group full">
        <label class="field-label">Servicios realizados</label>
        <div class="checkbox-group" id="servicios-chips">
          <label class="chip"><input type="checkbox" value="Manicura"> Manicura</label>
          <label class="chip"><input type="checkbox" value="Manicura esmalte tradicional"> Manicura esmalte tradicional</label>
          <label class="chip"><input type="checkbox" value="Manicura semipermanente"> Manicura semipermanente</label>
          <label class="chip"><input type="checkbox" value="Manicura estructurada semi"> Manicura estructurada semi</label>
          <label class="chip"><input type="checkbox" value="Pedicura"> Pedicura</label>
          <label class="chip"><input type="checkbox" value="Pedicura esmalte tradicional"> Pedicura esmalte tradicional</label>
          <label class="chip"><input type="checkbox" value="Pedicura semipermanente"> Pedicura semipermanente</label>
          <label class="chip"><input type="checkbox" value="Gel X largo S"> Gel X largo S</label>
          <label class="chip"><input type="checkbox" value="Gel X largo M"> Gel X largo M</label>
          <label class="chip"><input type="checkbox" value="Gel X largo L"> Gel X largo L</label>
          <label class="chip"><input type="checkbox" value="Gel X largo XL"> Gel X largo XL</label>
        </div>
      </div>
      <div class="section-sep">Estado y cuidados</div>
      <div class="form-group full">
        <label class="field-label">Estado de uñas al inicio</label>
        <textarea id="f-estado" placeholder="Ej: uñas frágiles, onicofagia, hongos previos..."></textarea>
      </div>
      <div class="form-group full">
        <label class="field-label">Detalles para la próxima atención</label>
        <textarea id="f-proxima" placeholder="Ej: prefiere largo M, colores neutros, viene cada 3 semanas..."></textarea>
      </div>
      <div class="section-sep">Datos extra</div>
      <div class="form-group full">
        <label class="field-label">Notas adicionales</label>
        <textarea id="f-notas" placeholder="Alergias, preferencias especiales, referencias..."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn primary" id="btn-save" onclick="saveClient()">Guardar clienta</button>
      <button class="btn danger" id="btn-delete" onclick="deleteClient()" style="display:none">Eliminar ficha</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://wvqbrdxleotupwxmxpuq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_JjPTnqCD1t-9IbyWf8xxFA_XARL7zw0';
const TABLE = 'clientas';

let allClients = [];

async function api(method, path, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : 'return=minimal'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || res.statusText);
  }
  return method === 'DELETE' || method === 'PATCH' ? null : res.json();
}

async function loadClients() {
  try {
    allClients = await api('GET', `${TABLE}?order=nombre.asc`);
    renderList();
  } catch(e) {
    document.getElementById('client-list').innerHTML = `<div class="empty">Error al conectar con la base de datos.<br><small>${e.message}</small></div>`;
  }
}

function initials(name) {
  return name.trim().split(' ').slice(0,2).map(w => w[0]?.toUpperCase() || '').join('');
}

function renderList() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = allClients.filter(c =>
    c.nombre.toLowerCase().includes(q) ||
    (c.telefono || '').toLowerCase().includes(q)
  );
  const el = document.getElementById('client-list');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty">${q ? 'Sin resultados.' : 'Todavía no hay clientas.<br>Agregá la primera con el botón de arriba.'}</div>`;
    return;
  }
  el.innerHTML = filtered.map(c => `
    <div class="client-card" onclick="openForm('${c.id}')">
      <div class="avatar">${initials(c.nombre)}</div>
      <div class="client-info">
        <div class="client-name">${c.nombre}</div>
        <div class="client-meta">${[c.telefono, c.inicio ? 'Desde ' + c.inicio : '', c.citas ? c.citas + ' citas' : ''].filter(Boolean).join(' · ')}</div>
      </div>
      <span style="color:#ccc; font-size:18px">›</span>
    </div>
  `).join('');
}

function openForm(id) {
  clearForm();
  document.getElementById('form-panel').classList.add('open');
  document.getElementById('btn-delete').style.display = 'none';
  if (id) {
    const c = allClients.find(x => x.id === id);
    if (!c) return;
    document.getElementById('form-title').textContent = c.nombre;
    document.getElementById('f-id').value = c.id;
    document.getElementById('f-nombre').value = c.nombre || '';
    document.getElementById('f-telefono').value = c.telefono || '';
    document.getElementById('f-correo').value = c.correo || '';
    document.getElementById('f-cumple').value = c.cumple || '';
    document.getElementById('f-nacionalidad').value = c.nacionalidad || '';
    document.getElementById('f-inicio').value = c.inicio || '';
    document.getElementById('f-citas').value = c.citas || '';
    document.getElementById('f-estado').value = c.estado || '';
    document.getElementById('f-proxima').value = c.proxima || '';
    document.getElementById('f-notas').value = c.notas || '';
    const servicios = c.servicios ? c.servicios.split('|') : [];
    document.querySelectorAll('#servicios-chips input').forEach(cb => {
      cb.checked = servicios.includes(cb.value);
      cb.closest('.chip').classList.toggle('checked', cb.checked);
    });
    document.getElementById('btn-delete').style.display = 'inline-flex';
  } else {
    document.getElementById('form-title').textContent = 'Nueva clienta';
  }
  window.scrollTo(0, 0);
}

function clearForm() {
  ['f-id','f-nombre','f-telefono','f-correo','f-cumple','f-nacionalidad','f-inicio','f-citas','f-estado','f-proxima','f-notas']
    .forEach(id => { document.getElementById(id).value = ''; });
  document.querySelectorAll('#servicios-chips input').forEach(cb => {
    cb.checked = false;
    cb.closest('.chip').classList.remove('checked');
  });
}

function closeForm() {
  document.getElementById('form-panel').classList.remove('open');
}

async function saveClient() {
  const nombre = document.getElementById('f-nombre').value.trim();
  if (!nombre) { alert('El nombre es obligatorio.'); return; }
  const id = document.getElementById('f-id').value || crypto.randomUUID();
  const servicios = [...document.querySelectorAll('#servicios-chips input:checked')].map(cb => cb.value).join('|');
  const client = {
    id, nombre,
    telefono: document.getElementById('f-telefono').value.trim() || null,
    correo: document.getElementById('f-correo').value.trim() || null,
    cumple: document.getElementById('f-cumple').value || null,
    nacionalidad: document.getElementById('f-nacionalidad').value.trim() || null,
    inicio: document.getElementById('f-inicio').value || null,
    citas: parseInt(document.getElementById('f-citas').value) || 0,
    estado: document.getElementById('f-estado').value.trim() || null,
    proxima: document.getElementById('f-proxima').value.trim() || null,
    notas: document.getElementById('f-notas').value.trim() || null,
    servicios: servicios || null
  };
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Guardando...';
  try {
    const exists = allClients.find(x => x.id === id);
    if (exists) {
      await api('PATCH', `${TABLE}?id=eq.${id}`, client);
      const idx = allClients.findIndex(x => x.id === id);
      allClients[idx] = { ...allClients[idx], ...client };
    } else {
      await api('POST', TABLE, client);
      allClients.push(client);
      allClients.sort((a,b) => a.nombre.localeCompare(b.nombre));
    }
    showToast('Clienta guardada ✓');
    closeForm();
    renderList();
  } catch(e) {
    alert('Error al guardar: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar clienta';
  }
}

async function deleteClient() {
  const id = document.getElementById('f-id').value;
  if (!id) return;
  if (!confirm('¿Eliminar esta ficha? Esta acción no se puede deshacer.')) return;
  try {
    await api('DELETE', `${TABLE}?id=eq.${id}`);
    allClients = allClients.filter(x => x.id !== id);
    showToast('Ficha eliminada');
    closeForm();
    renderList();
  } catch(e) {
    alert('Error al eliminar: ' + e.message);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.querySelectorAll('#servicios-chips .chip input').forEach(cb => {
  cb.addEventListener('change', () => cb.closest('.chip').classList.toggle('checked', cb.checked));
});

loadClients();
</script>
</body>
</html>
